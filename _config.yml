# Site settings
title: Timothy Masset
email: contact@timothymasset.be
url: https://timothymasset.be
description: "Site web de Timothy Masset"
keywords: "timothy, masset"
skills: "Automation - Master en Architecture des Systèmes Informatiques - Réalité Virtuelle"
meta_author: Masset Timothy

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #80B3FF
  primary-rgb: "24,288,156" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Timothy Masset
  location: Adresse
  social: Autres réseaux
  credits: Crédits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: facebook
    url: https://www.facebook.com/timothymasset
  - title: linkedin
    url: https://www.linkedin.com/in/timothy-masset
  - title: github
    url: http://github.com/rafuryc

# Postal address (add as many lines as necessary)
address:
  - line: 4000 Liège
  - line: Belgique

# Credits content
credits: 'Template Jekyll utilisé pour ce site : <a href="https://github.com/jeromelachaud/freelancer-theme" target="_blank" rel="noopener noreferrer">Freelancer</a>.'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
